name: Publish to JSR
on:
  release:
    types: [created]
  workflow_dispatch: 

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with: 
            node-version: '24'

      - name: Install Package
        run: npm install

      - name: Run Tests
        run: npm test
        
      - name: Publish package
        run: npx jsr publish
