name: Publish to JSR
on:
  workflow_dispatch: 

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@6
      - name: Use a custom action (example)
        uses: actions/setup-node@v4
        with: 
            node-version: '24'
            
      - name: Publish package
        run: npx jsr publish
